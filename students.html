      return `https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=${encodeURIComponent(url)}`;
    }

    function makeCard(tool) {
      const cat = CATEGORIES[tool.cat] || { label: tool.cat, badge: 'badge-math' };
      const qr = makeQR(tool.url);
      return `
      <div class="gundam-card p-5 flex flex-col items-center text-center gap-4" data-cat="${tool.cat}" data-name="${tool.name}">
        <div class="text-5xl">${tool.icon}</div>
        <div class="flex-1 w-full">
          <div class="flex items-center justify-center gap-2 mb-2">
            <span class="text-xs px-2 py-1 rounded-full ${cat.badge} font-medium">${cat.label}</span>
          </div>
          <h3 class="font-bold text-gray-800 dark:text-gray-100 text-base mb-1 leading-tight">${tool.name}</h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 leading-snug">${tool.desc}</p>
        </div>
        <div class="flex flex-col items-center gap-2 w-full">
          <div class="qr-container rounded-xl overflow-hidden bg-white p-2 shadow-sm border border-gray-100 dark:border-gray-700">
            <img src="${qr}" alt="QR Code for ${tool.name}" loading="lazy">
          </div>
          <a href="${tool.url}" target="_blank" rel="noopener"
             class="w-full py-2.5 px-4 rounded-xl bg-primary-500 hover:bg-primary-600 text-white text-sm font-semibold text-center transition-colors flex items-center justify-center gap-2">
            <span>前往工具</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>
        </div>
      </div>`;
    }

    function renderTools() {
      const grid = document.getElementById('tools-grid');
      const noResults = document.getElementById('no-results');
      let tools = STUDENT_TOOLS;
      if (currentCat !== 'all') {
        tools = tools.filter(t => t.cat === currentCat);
      }
      if (currentSearch.trim()) {
        const q = currentSearch.trim().toLowerCase();
        tools = tools.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
      }
      if (tools.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        grid.innerHTML = tools.map(makeCard).join('');
      }
    }

    function setCat(cat) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        if (btn.dataset.cat === cat) {
          btn.classList.add('active', 'border-primary-500', 'bg-primary-500', 'text-white');
          btn.classList.remove('border-gray-200', 'text-gray-600', 'dark:text-gray-300');
        } else {
          btn.classList.remove('active', 'border-primary-500', 'bg-primary-500', 'text-white');
          btn.classList.add('border-gray-200', 'text-gray-600', 'dark:text-gray-300');
        }
      });
      renderTools();
    }

    function filterTools() {
      currentSearch = document.getElementById('search').value;
      renderTools();
    }

    function setTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        isDark = true;
      } else if (theme === 'gundam-ntd') {
        document.documentElement.classList.remove('dark');
        document.documentElement.setAttribute('data-theme', 'gundam-ntd');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
      }
    }

    // Init
    document.getElementById('tool-count').textContent = STUDENT_TOOLS.length;
    document.getElementById('cat-count').textContent = Object.keys(CATEGORIES).length;
    renderTools();
  </script>
</body>
</html>
