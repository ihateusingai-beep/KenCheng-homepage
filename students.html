  <style>
    * { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #0f0e1a; } /* dark default */
    .light body { background: #f8f5ff; }

    /* Grade badge colors */
    .grade-p1 { background: #dbeafe; color: #1e40af; }
    .grade-p2 { background: #d1fae5; color: #065f46; }
    .grade-p3 { background: #fef3c7; color: #92400e; }
    .dark .grade-p1 { background: #1e3a8a; color: #93c5fd; }
    .dark .grade-p2 { background: #064e3b; color: #6ee7b7; }
    .dark .grade-p3 { background: #451a03; color: #fde68a; }

    /* Category badge */
    .badge-math { background: #ede9fe; color: #5b21b6; }
    .badge-lang  { background: #fce7f3; color: #9d174d; }
    .badge-sci   { background: #dbeafe; color: #1e40af; }
    .badge-life  { background: #d1fae5; color: #065f46; }
    .badge-game  { background: #fef3c7; color: #92400e; }
    .badge-class { background: #e0f2fe; color: #075985; }
    .badge-art   { background: #fce7f3; color: #be185d; }
    .dark .badge-math { background: #2e1065; color: #c4b5fd; }
    .dark .badge-lang  { background: #4a044e; color: #fbcfe8; }
    .dark .badge-sci   { background: #1e3a8a; color: #93c5fd; }
    .dark .badge-life  { background: #064e3b; color: #6ee7b7; }
    .dark .badge-game  { background: #451a03; color: #fde68a; }
    .dark .badge-class { background: #0c4a6e; color: #7dd3fc; }
    .dark .badge-art   { background: #500724; color: #f9a8d4; }

    /* Cards - touch friendly */
    .tool-card {
      background: #1e1b4b;
      border: 1px solid #312e81;
      border-radius: 1.25rem;
      padding: 1.25rem;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      gap: 0.75rem;
      -webkit-user-select: none;
      user-select: none;
    }
    .tool-card:active { transform: scale(0.97); }
    .light .tool-card {
      background: white;
      border-color: #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .light .tool-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(99,102,241,0.15); }

    .tool-card .icon { font-size: 3rem; line-height: 1; }
    .tool-card h3 { font-size: 1.1rem; font-weight: 700; color: #e0e0ff; line-height: 1.3; }
    .light .tool-card h3 { color: #1f2937; }
    .tool-card p { font-size: 0.9rem; color: #9ca3af; line-height: 1.5; }
    .light .tool-card p { color: #6b7280; }

    /* Loading skeletons */
    .skeleton-card {
      min-height: 280px;
      border-radius: 1.25rem;
      background: linear-gradient(90deg, #1e1b4b 25%, #2d2b5a 50%, #1e1b4b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .light .skeleton-card {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .fav-star {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; cursor: pointer;
      font-size: 1.4rem; line-height: 1;
      transition: transform 0.15s;
    }
    .fav-star:active { transform: scale(1.3); }
    .light .fav-star { filter: none; }

    /* QR container */
    .qr-container { width: 110px; height: 110px; }
    .qr-container img { width: 100%; height: 100%; object-fit: contain; }

    /* Badges row */
    .badge-row { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center; }
    .badge-row span { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 20px; font-weight: 600; }

    .go-btn:hover { background: #4f46e5; }

    /* Grade filter - big touch buttons */

      font-size: 0.9rem;

    /* Sort buttons */

      border: 2px solid #312e81;
      background: #1e1b4b;

      font-size: 0.85rem;

    .sort-btn:active { transform: scale(0.93); }
    .sort-btn.active {
      background: #6366f1;

    }
    .light .sort-btn {
      background: white;
      border-color: #e2e8f0;
      color: #6b7280;
    }
    .light .sort-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    /* Theme toggle - large touch buttons */
    .theme-toggle { position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 8px; }
    .theme-btn {
      width: 48px; height: 48px; border-radius: 50%; border: 2px solid #312e81;
      background: #1e1b4b; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: all 0.2s;
    }
    .theme-btn:active { transform: scale(0.9); }
    .light .theme-btn { background: white; border-color: #e2e8f0; }

    /* Search input - bigger */
    #search {
      width: 100%; padding: 1rem 1rem 1rem 3rem;
      font-size: 1.1rem;
      border-radius: 1.25rem;
      border: 2px solid #312e81;
      background: #1e1b4b;
      color: #e0e0ff;
      outline: none;
    }
    #search::placeholder { color: #6b7280; }
    #search:focus { border-color: #6366f1; }
    .light #search {
      background: white;
      border-color: #e2e8f0;
      color: #1f2937;
    }
    .light #search:focus { border-color: #6366f1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0e1a; }
    ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 3px; }

    /* Card overlay QR modal */
    .qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;

      padding: 1rem;

    .qr-modal.show { display: flex; }
    .qr-modal-box {
      background: #1e1b4b;

      border-radius: 1.5rem;

  <script>
    let STUDENT_TOOLS = [];
    let currentGrade = 'all';
    let currentCat = 'all';
    let currentSearch = '';
    let currentSort = 'default';

    function restoreSortPreference() {
      const saved = localStorage.getItem('students_sort');
      if (saved === 'name' || saved === 'cat') {
        currentSort = saved;
        document.querySelectorAll('.sort-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.sort === saved);
        });
      }
    }

    function getFavorites() {
      try { return JSON.parse(localStorage.getItem('student_favorites') || '[]'); }
      catch { return []; }
    }

    function toggleFav(name, btn) {
      let favs = getFavorites();
      if (favs.includes(name)) {
        favs = favs.filter(f => f !== name);
        if (btn) { btn.textContent = '☆'; btn.classList.remove('active'); }
      } else {
        favs.push(name);
        if (btn) { btn.textContent = '⭐'; btn.classList.add('active'); }
      }
      localStorage.setItem('student_favorites', JSON.stringify(favs));
    }

    fetch('/KenCheng-homepage/assets/student-tools.json')
      .then(r => r.json())
      .then(data => {
        STUDENT_TOOLS = data;
        document.getElementById('tool-count').textContent = STUDENT_TOOLS.length;
        document.getElementById('filter-count').textContent = STUDENT_TOOLS.length;
        renderTools();
      })
      .catch(() => { document.getElementById('tool-count').textContent = '?'; });

    function makeQR(url) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=${encodeURIComponent(url)}`;
    }

    function showQR(name, url, imgEl) {
      document.getElementById('qrModalName').textContent = name;
      document.getElementById('qrModalImg').innerHTML = `<img src="${makeQR(url)}" alt="QR for ${name}">`;
      document.getElementById('qrModal').classList.add('show');
    }

    function closeQR(e) {
      if (e.target === document.getElementById('qrModal')) closeQRDirect();
    }
    function closeQRDirect() { document.getElementById('qrModal').classList.remove('show'); }

    function makeCard(tool) {
      const isFav = getFavorites().includes(tool.name);
      const lastVisit = getLastVisitedFor(tool.name);
      const gradeBadge = tool.level === 'all'
        ? `<span class="grade-p1" style="font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:20px;background:rgba(99,102,241,0.2);color:#a5b4fc;">通用</span>`
        : `<span class="grade-${tool.level.toLowerCase()}" style="font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:20px;">${tool.level}</span>`;
      const visitBadge = lastVisit ? `<span style="font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:20px;background:rgba(34,197,94,0.15);color:#4ade80;">${lastVisit}</span>` : '';

      return `
      <div class="tool-card" data-cat="${tool.cat}" data-grade="${tool.level}" onclick="setLastVisited('${tool.name.replace(/'/g, "\\'")}')">
        <div style="display:flex;gap:0.3rem;flex-wrap:wrap;justify-content:center;">${gradeBadge}${visitBadge}</div>
        <div class="icon">${tool.icon}</div>
        <button class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav('${tool.name.replace(/'/g, "\\'")}', this)" title="${isFav ? '移除收藏' : '加入收藏'}">${isFav ? '⭐' : '☆'}</button>
        <div style="flex:1;width:100%;">
          <h3>${tool.name}</h3>
          <p style="margin-top:0.3rem;">${tool.desc}</p>
        </div>
        <div style="width:100%;display:flex;flex-direction:column;gap:0.5rem;">
          <div class="qr-container rounded-xl overflow-hidden bg-white p-2 mx-auto" onclick="event.stopPropagation(); showQR('${tool.name}', '${tool.url}', this)">
            <img src="${makeQR(tool.url)}" alt="QR" loading="lazy" style="cursor:pointer;">
          </div>
          <a href="${tool.url}" target="_blank" rel="noopener" class="go-btn" onclick="event.stopPropagation()">
            <span>前往工具</span>
            <svg style="width:18px;height:18px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>
        </div>
      </div>`;
    }

    function renderTools() {
      const grid = document.getElementById('tools-grid');
      const noResults = document.getElementById('no-results');
      let tools = STUDENT_TOOLS;
      if (currentGrade !== 'all') tools = tools.filter(t => t.level === currentGrade);
      if (currentCat === 'fav') tools = tools.filter(t => getFavorites().includes(t.name));
      else if (currentCat !== 'all') tools = tools.filter(t => t.cat === currentCat);
      if (currentSearch.trim()) {
        const q = currentSearch.trim().toLowerCase();
        tools = tools.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
      }
      if (currentSort === 'name') tools.sort((a, b) => a.name.localeCompare(b.name));
      else if (currentSort === 'cat') tools.sort((a, b) => a.cat.localeCompare(b.cat));
      document.getElementById('filter-count').textContent = tools.length;
      if (tools.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        grid.innerHTML = tools.map(makeCard).join('');
      }
    }

    function setGrade(grade) {
      currentGrade = grade;
      document.querySelectorAll('.grade-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.grade === grade);
      });
      renderTools();
    }

    function setCat(cat) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === cat);
      });
      renderTools();
    }

    function setSort(sort) {
      currentSort = sort;
      localStorage.setItem('students_sort', sort);
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sort === sort);
      });
      renderTools();
    }

    function filterTools() {
      currentSearch = document.getElementById('search').value;
      renderTools();
    }

    function setTheme(theme) {
      if (theme === 'light') {
        document.documentElement.classList.add('light');
        localStorage.setItem('students_theme', 'light');
      } else {
        document.documentElement.classList.remove('light');
        localStorage.setItem('students_theme', 'dark');
      }
      updateThemeButtons();
    }

    function updateThemeButtons() {
      const isLight = document.documentElement.classList.contains('light');
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.style.opacity = (isLight && btn.textContent.includes('☀️')) || (!isLight && btn.textContent.includes('🌙')) ? '1' : '0.4';
      });
    }

    function getLastVisited() {
      try { return JSON.parse(localStorage.getItem('student_last_visited') || '{}'); }
      catch { return {}; }
    }

    function setLastVisited(name) {
      const visited = getLastVisited();
      visited[name] = Date.now();
      localStorage.setItem('student_last_visited', JSON.stringify(visited));
    }

    function getLastVisitedFor(name) {
      const ts = getLastVisited()[name];
      if (!ts) return null;
      const diff = Date.now() - ts;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分鐘前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小時前';
      return Math.floor(diff / 86400000) + '天前';
    }

    // Init
    const savedTheme = localStorage.getItem('students_theme');
    if (savedTheme === 'light') {
      document.documentElement.classList.add('light');
    }
    updateThemeButtons();
    restoreSortPreference();
    // Tools loaded via fetch below
  </script>
</body>
</html>
