      { name: "早安天氣與早餐", url: "https://morning-meal-mate.lovable.app/", desc: "結合天氣資訊的早餐選擇助手，培養生活自理能力", cat: "life", level: "P1", icon: "🌤️" },
      // ===== 課堂 =====
      { name: "課堂情緒溫度計", url: "https://v0-classroom-mood-thermometer.vercel.app/", desc: "檢測課堂情緒氛圍的互動工具", cat: "classroom", level: "all", icon: "🌡️" },
      { name: "情緒舒緩", url: "https://chengky-bot.github.io/cf-video/", desc: "提供情緒舒緩與放鬆的輔助工具", cat: "classroom", level: "all", icon: "🧘" },
      { name: "StarClass Hub", url: "https://ihateusingai-beep.github.io/starclass-hub/", desc: "課堂獎勵系統：學生管理、角色、等級與星星兑換", cat: "classroom", level: "all", icon: "⭐" },
      { name: "Friendly Classroom", url: "https://chengky-bot.github.io/friendly-classroom/", desc: "正向行為支持與課堂管理工具", cat: "classroom", level: "all", icon: "🤝" },
      { name: "學生任務應用", url: "https://chengky-bot.github.io/student-mission/", desc: "學生任務追蹤與完成激勵工具", cat: "classroom", level: "all", icon: "📋" },
      // ===== 創意 =====
      { name: "空氣畫 (Air Drawing)", url: "https://air-drawing.vercel.app/", desc: "用身體姿勢作畫，互動創意藝術體驗", cat: "art", level: "all", icon: "🎨" },
      { name: "The Toymaker", url: "https://www.thetoymaker.com/", desc: "免費紙藝模型與摺紙資源", cat: "art", level: "all", icon: "✂️" },
      // ===== 遊戲 =====
      { name: "Jigidi", url: "https://www.jigidi.com/", desc: "免費線上拼圖遊戲，訓練觀察力與專注", cat: "game", level: "all", icon: "🧩" },
      { name: "GeoFS", url: "https://www.geo-fs.com/", desc: "基於瀏覽器的全球飛行模擬器", cat: "game", level: "P3", icon: "✈️" },
      // ===== 實用工具 =====
      { name: "QR Code 產生器", url: "https://chengky-bot.github.io/qrcode-gen/", desc: "為工具生成 QR Code，方便移動裝置掃描", cat: "life", level: "all", icon: "📱" },
      { name: "打字練習工具", url: "https://chengky-bot.github.io/typing-practice/", desc: "鍵盤指法練習，提升打字速度", cat: "life", level: "P2", icon: "⌨️" },
      { name: "Typing Kingdom", url: "https://ihateusingai-beep.github.io/typing-kingdom/", desc: "打字王國：闖關式鍵盤練習，適合初學者", cat: "life", level: "all", icon: "⌨️" },
      { name: "Kiddo Worksheets", url: "https://www.kiddoworksheets.com/", desc: "免費可列印兒童學習工作紙", cat: "math", level: "all", icon: "📝" },
      // ===== 教育學習 =====
      { name: "PhET Interactive Simulations", url: "https://phet.colorado.edu/", desc: "科羅拉多大學互動科學模擬實驗室", cat: "science", level: "P3", icon: "🔬" },
      { name: "Explore.org", url: "https://explore.org/", desc: "野生動物直播與環境教育影片", cat: "science", level: "all", icon: "🦁" },
      { name: "Animagraffs", url: "https://www.animagraffs.com/", desc: "剖面圖解機械與生物運作原理", cat: "science", level: "P3", icon: "⚙️" },
      // ===== AI =====
      { name: "Doubao (豆包)", url: "https://www.doubao.com/", desc: "位元組跳動 AI 助手，適合簡單學習問題", cat: "life", level: "P3", icon: "🤖" },
    ];

    const GRADE_LABELS = { P1: 'P1', P2: 'P2', P3: 'P3' };
    const CAT_LABELS = { math:'📐', lang:'📖', science:'🔬', life:'🌱', classroom:'🏠', game:'🎮', art:'🎨' };

    let currentGrade = 'all';
    let currentCat = 'all';
    let currentSearch = '';

    function makeQR(url) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=${encodeURIComponent(url)}`;
    }

    function showQR(name, url, imgEl) {
      document.getElementById('qrModalName').textContent = name;
      document.getElementById('qrModalImg').innerHTML = `<img src="${makeQR(url)}" alt="QR for ${name}">`;
      document.getElementById('qrModal').classList.add('show');
    }

    function closeQR(e) {
      if (e.target === document.getElementById('qrModal')) closeQRDirect();
    }
    function closeQRDirect() { document.getElementById('qrModal').classList.remove('show'); }

    function makeCard(tool) {
      const gradeBadge = tool.level === 'all'
        ? `<span class="grade-p1" style="font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:20px;background:rgba(99,102,241,0.2);color:#a5b4fc;">通用</span>`
        : `<span class="grade-${tool.level.toLowerCase()}" style="font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:20px;">${tool.level}</span>`;

      return `
      <div class="tool-card" data-cat="${tool.cat}" data-grade="${tool.level}">
        ${gradeBadge}
        <div class="icon">${tool.icon}</div>
        <div style="flex:1;width:100%;">
          <h3>${tool.name}</h3>
          <p style="margin-top:0.3rem;">${tool.desc}</p>
        </div>
        <div style="width:100%;display:flex;flex-direction:column;gap:0.5rem;">
          <div class="qr-container rounded-xl overflow-hidden bg-white p-2 mx-auto" onclick="event.stopPropagation(); showQR('${tool.name}', '${tool.url}', this)">
            <img src="${makeQR(tool.url)}" alt="QR" loading="lazy" style="cursor:pointer;">
          </div>
          <a href="${tool.url}" target="_blank" rel="noopener" class="go-btn" onclick="event.stopPropagation()">
            <span>前往工具</span>
            <svg style="width:18px;height:18px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>
        </div>
      </div>`;
    }

    function renderTools() {
      const grid = document.getElementById('tools-grid');
      const noResults = document.getElementById('no-results');
      let tools = STUDENT_TOOLS;
      if (currentGrade !== 'all') tools = tools.filter(t => t.level === currentGrade);
      if (currentCat !== 'all') tools = tools.filter(t => t.cat === currentCat);
      if (currentSearch.trim()) {
        const q = currentSearch.trim().toLowerCase();
        tools = tools.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
      }
      if (tools.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        grid.innerHTML = tools.map(makeCard).join('');
      }
    }

    function setGrade(grade) {
      currentGrade = grade;
      document.querySelectorAll('.grade-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.grade === grade);
      });
      renderTools();
    }

    function setCat(cat) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === cat);
      });
      renderTools();
    }

    function filterTools() {
      currentSearch = document.getElementById('search').value;
      renderTools();
    }

    function setTheme(theme) {
      if (theme === 'light') {
        document.documentElement.classList.add('light');
      } else {
        document.documentElement.classList.remove('light');
      }
    }

    // Init - dark default
    document.getElementById('tool-count').textContent = STUDENT_TOOLS.length;
    renderTools();
  </script>
</body>
</html>
