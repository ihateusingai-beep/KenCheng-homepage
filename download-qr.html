  <script>
    tailwind.config = {
      darkClass: 'dark',
      theme: {
        extend: {
          fontFamily: { noto: ['Noto Sans TC', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca' },

  <style>

<body class="min-h-screen">
  <div class="max-w-3xl mx-auto px-4 py-10">
    <a href="https://ihateusingai-beep.github.io/KenCheng-homepage/students.html" class="inline-flex items-center gap-2 text-primary-600 hover:text-primary-800 dark:text-primary-300 text-sm font-medium mb-6">
      ← 返回學生專區

    <div class="text-center mb-8">
      <div class="text-5xl mb-4">📥</div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-2">下載全部 QR Code</h1>
      <p class="text-gray-500 dark:text-gray-400">一鍵下載 PDF，每個工具一頁，方便打印帶回家</p>
    </div>

    <!-- Status -->
    <div id="status-panel" class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-6 mb-6 shadow-sm">
      <div class="flex items-center justify-between mb-4">
        <span class="font-semibold text-gray-700 dark:text-gray-200">準備下載</span>

      <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
        <div id="progress-bar" class="h-full bg-primary-500 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
      <div id="status-detail" class="mt-3 text-sm text-gray-500 dark:text-gray-400 text-center"></div>
    </div>

    <!-- Action buttons -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
      <button id="btn-all" onclick="generatePDF('all')"
              class="py-4 px-6 rounded-2xl bg-primary-500 hover:bg-primary-600 text-white font-bold text-lg transition-colors flex flex-col items-center gap-2 shadow-lg">
        <span class="text-2xl">📄</span>
        <span>全部 QR Code PDF</span>
        <span class="text-xs font-normal opacity-80">43個工具 · A4豎向</span>
      </button>

      <button id="btn-math" onclick="generatePDF('math')"

        <span class="text-2xl">📐</span>
        <span>數學工具 QR Code</span>
        <span class="text-xs font-normal opacity-80">12個工具</span>
      </button>

      <button id="btn-science" onclick="generatePDF('science')"

        <span class="text-2xl">🔬</span>
        <span>科學工具 QR Code</span>
        <span class="text-xs font-normal opacity-80">13個工具</span>
      </button>

      <button id="btn-lang" onclick="generatePDF('lang')"
              class="py-4 px-6 rounded-2xl bg-pink-500 hover:bg-pink-600 text-white font-bold text-lg transition-colors flex flex-col items-center gap-2 shadow-lg">
        <span class="text-2xl">📖</span>
        <span>語文工具 QR Code</span>
        <span class="text-xs font-normal opacity-80">4個工具</span>
      </button>
    </div>

    <div class="text-center text-gray-400 dark:text-gray-600 text-sm">
      <p>每個工具一頁 QR Code，方便家長學生打印 📠</p>
    </div>
  </div>

  { name: "水循環互動學習", url: "https://chengky-bot.github.io/water-cycle-interactive/", desc: "可拖拽的水循環互動學習工具", cat: "science", icon: "🌊" },

  { name: "課堂情緒溫度計", url: "https://v0-classroom-mood-thermometer.vercel.app/", desc: "檢測課堂情緒氛圍的互動工具", cat: "classroom", icon: "🌡️" },
  { name: "情緒舒緩", url: "https://chengky-bot.github.io/cf-video/", desc: "提供情緒舒緩與放鬆的輔助工具", cat: "classroom", icon: "🧘" },
  { name: "StarClass Hub", url: "https://ihateusingai-beep.github.io/starclass-hub/", desc: "課堂獎勵系統：學生管理、角色、等級與星星兑換", cat: "classroom", icon: "⭐" },
  { name: "Friendly Classroom", url: "https://chengky-bot.github.io/friendly-classroom/", desc: "正向行為支持與課堂管理工具", cat: "classroom", icon: "🤝" },
  { name: "學生任務任務應用", url: "https://chengky-bot.github.io/student-mission/", desc: "學生任務追蹤與完成激勵工具", cat: "classroom", icon: "📋" },
  // 創意
  { name: "空氣畫 (Air Drawing)", url: "https://air-drawing.vercel.app/", desc: "用身體姿勢作畫，互動創意藝術體驗", cat: "art", icon: "🎨" },
  { name: "The Toymaker", url: "https://www.thetoymaker.com/", desc: "免費紙藝模型與摺紙資源", cat: "art", icon: "✂️" },
  // 遊戲
  { name: "Jigidi", url: "https://www.jigidi.com/", desc: "免費線上拼圖遊戲，訓練觀察力與專注", cat: "game", icon: "🧩" },
  { name: "GeoFS", url: "https://www.geo-fs.com/", desc: "基於瀏覽器的全球飛行模擬器", cat: "game", icon: "✈️" },

  { name: "打字練習工具", url: "https://chengky-bot.github.io/typing-practice/", desc: "鍵盤指法練習，提升打字速度", cat: "life", icon: "⌨️" },
  { name: "Kiddo Worksheets", url: "https://www.kiddoworksheets.com/", desc: "免費可列印兒童學習工作紙", cat: "math", icon: "📝" },
  { name: "PhET Interactive Simulations", url: "https://phet.colorado.edu/", desc: "科羅拉多大學互動科學模擬實驗室", cat: "science", icon: "🔬" },
  { name: "Explore.org", url: "https://explore.org/", desc: "野生動物直播與環境教育影片", cat: "science", icon: "🦁" },
  { name: "Animagraffs", url: "https://www.animagraffs.com/", desc: "剖面圖解機械與生物運作原理", cat: "science", icon: "⚙️" },
  { name: "Doubao (豆包)", url: "https://www.doubao.com/", desc: "位元組跳動 AI 助手，適合簡單學習問題", cat: "life", icon: "🤖" },
];

const CAT_INFO = {
  math:     { label: '📐 數學', color: '#7c3aed', bgColor: '#f3e8ff' },
  lang:     { label: '📖 語文', color: '#db2777', bgColor: '#fce7f3' },
  science:  { label: '🔬 科學', color: '#2563eb', bgColor: '#dbeafe' },
  life:     { label: '🌱 生活', color: '#059669', bgColor: '#d1fae5' },
  classroom:{ label: '🏠 課堂', color: '#0891b2', bgColor: '#e0f2fe' },
  game:     { label: '🎮 遊戲', color: '#d97706', bgColor: '#fef3c7' },
  art:      { label: '🎨 創意', color: '#db2777', bgColor: '#fce7f3' },
};

let isGenerating = false;

function makeQRUrl(url, size = 256) {
  return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}`;
}

async function generatePDF(catFilter) {
  if (isGenerating) return;
  isGenerating = true;

  const tools = catFilter === 'all' ? STUDENT_TOOLS : STUDENT_TOOLS.filter(t => t.cat === catFilter);
  const total = tools.length;
  const label = catFilter === 'all' ? '全部工具' : (CAT_INFO[catFilter]?.label || catFilter);
  const color = catFilter === 'all' ? '#4f46e5' : (CAT_INFO[catFilter]?.color || '#4f46e5');

  document.getElementById('progress-text').textContent = `正在生成... 0 / ${total}`;
  document.getElementById('btn-all').disabled = true;
  document.getElementById('btn-all').classList.add('opacity-50', 'cursor-not-allowed');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210;
  const H = 297;
  const margin = 15;
  const qrSize = 70;

  for (let i = 0; i < tools.length; i++) {
    const tool = tools[i];
    const pageNum = i + 1;
    const pct = Math.round((i / total) * 100);

    doc.setDrawColor(230);
    doc.setFillColor(250, 248, 255);
    doc.rect(0, 0, W, H, 'FD');

    // Header bar
    doc.setFillColor(99, 102, 241);
    doc.rect(0, 0, W, 18, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Ken Cheng 電子學習工具  QR Code', margin, 12);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text(`${label}  ·  ${pageNum} / ${total}`, W - margin, 12, { align: 'right' });

    // Category badge
    const catInfo = CAT_INFO[tool.cat] || { label: tool.cat, color: '#6366f1', bgColor: '#eef2ff' };
    const badgeLabel = catInfo.label;
    doc.setFontSize(9);
    const badgeW = doc.getTextWidth(badgeLabel) + 10;
    const badgeX = (W - badgeW) / 2;
    doc.setFillColor(catInfo.color);
    doc.roundedRect(badgeX, 22, badgeW, 8, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.text(badgeLabel, W / 2, 27.5, { align: 'center' });

    // Icon + Tool name
    doc.setTextColor(30, 30, 60);
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.text(tool.icon || '🔗', margin, 52);
    doc.setFontSize(18);
    const nameX = margin + 16;
    doc.text(tool.name, nameX, 52);

    // Description
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(80, 80, 100);
    const descLines = doc.splitTextToSize(tool.desc, W - 2 * margin - 10);
    doc.text(descLines, margin, 62);

    // QR Code
    const qrUrl = makeQRUrl(tool.url, 512);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 512;
      canvas.height = 512;
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, 512, 512);
      img.src = qrUrl;
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = rej;
        setTimeout(rej, 8000);
      });
      ctx.drawImage(img, 0, 0, 512, 512);
      const qrDataUrl = canvas.toDataURL('image/png');
      const qrX = (W - qrSize) / 2;
      const qrY = 75;
      doc.addImage(qrDataUrl, 'PNG', qrX, qrY, qrSize, qrSize);
    } catch (e) {
      // Fallback: draw placeholder QR square
      doc.setDrawColor(180);
      doc.setFillColor(245, 245, 245);
      const qrX = (W - qrSize) / 2;
      doc.rect(qrX, 75, qrSize, qrSize, 'FD');
      doc.setFontSize(10);
      doc.setTextColor(150);
      doc.text('QR 載入中...', W / 2, 75 + qrSize / 2 + 4, { align: 'center' });
    }

    // URL
    doc.setFontSize(9);
    doc.setTextColor(120, 120, 160);
    doc.text(tool.url, W / 2, 155, { align: 'center', maxWidth: W - 2 * margin });

    // Footer
    doc.setFillColor(240, 238, 255);
    doc.rect(0, H - 14, W, 14, 'F');
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 180);
    doc.text('Ken Cheng 電子教學工具 · 學生專區', margin, H - 5);
    doc.text('掃描 QR Code 即可使用', W - margin, H - 5, { align: 'right' });

    if (i < tools.length - 1) doc.addPage();

    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `正在生成... ${i + 1} / ${total}`;
    document.getElementById('status-detail').textContent = tool.name;
    await new Promise(r => setTimeout(r, 50));
  }

  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = `完成！共 ${total} 個工具`;
  document.getElementById('status-detail').textContent = '正在下載...';

  const filename = catFilter === 'all' ? 'KenCheng_QR_Codes.pdf' : `KenCheng_${catFilter}_QR.pdf`;
  doc.save(filename);

  isGenerating = false;
  document.getElementById('btn-all').disabled = false;
  document.getElementById('btn-all').classList.remove('opacity-50', 'cursor-not-allowed');
}
</script>
</body>
</html>
