  <style>
/* ============================
   GUNDAM CONSOLE UI THEME
   RX-0 Unicorn NT-D + Strike Freedom
   ============================ */
[data-theme="gundam"] {
  --accent: #00D4FF;
  --accent-glow: rgba(0, 212, 255, 0.25);
  --psychoframe-pink: #FF69B4;
  --prismatic-blue: #0066CC;
  --gold-accent: #FFD700;
  --bg-primary: #0a0f1a;
  --bg-card: #121830;
  --bg-input: #1a2540;
  --border-color: #1E3A5F;
  --text-primary: #E8F4F8;
  --text-secondary: #6A8BA8;
  --success: #00AA00;
  --warning: #FF8C00;
  --danger: #FF4444;
}

/* --- HUD Frame --- */
[data-theme="gundam"] .gundam-hud-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  box-shadow: 0 0 15px var(--accent-glow);
}
[data-theme="gundam"] .gundam-hud-card::before,
[data-theme="gundam"] .gundam-hud-card::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid var(--accent);
  opacity: 0.6;
}
[data-theme="gundam"] .gundam-hud-card::before {
  top: -1px; left: -1px;
  border-right: none; border-bottom: none;
}
[data-theme="gundam"] .gundam-hud-card::after {
  bottom: -1px; right: -1px;
  border-left: none; border-top: none;
}

/* --- Psychoframe Pulse --- */
@keyframes psychoframePulse {
  0%, 100% { 
    box-shadow: 0 0 10px rgba(255,105,180,0.3), 0 0 20px rgba(255,105,180,0.2);
  }
  50% { 
    box-shadow: 0 0 25px rgba(255,105,180,0.6), 0 0 50px rgba(255,105,180,0.3);
  }
}
[data-theme="gundam"] .gundam-pulse {
  animation: psychoframePulse 2s ease-in-out infinite;
}

/* --- Radar Sweep --- */
@keyframes radarSweep {
  0% { transform: rotate(0deg); opacity: 0.8; }
  100% { transform: rotate(360deg); opacity: 0.3; }
}
@keyframes radarPing {
  0% { transform: scale(0.5); opacity: 0.8; }
  100% { transform: scale(2); opacity: 0; }
}
[data-theme="gundam"] .gundam-radar {
  position: relative;
  overflow: hidden;
}
[data-theme="gundam"] .gundam-radar::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 80px; height: 80px;
  margin: -40px 0 0 -40px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  animation: radarSweep 3s linear infinite;
}
[data-theme="gundam"] .gundam-radar::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 20px; height: 20px;
  margin: -10px 0 0 -10px;
  border-radius: 50%;
  background: var(--accent);
  animation: radarPing 1.5s ease-out infinite;
}

/* --- Status Indicators --- */
@keyframes statusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
@keyframes statusGlow {
  0%, 100% { box-shadow: 0 0 5px currentColor; }
  50% { box-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
}
[data-theme="gundam"] .gundam-status-ok { color: var(--success); animation: statusBlink 2s ease-in-out infinite; }
[data-theme="gundam"] .gundam-status-warn { color: var(--warning); animation: statusGlow 1s ease-in-out infinite; }
[data-theme="gundam"] .gundam-status-alert { color: var(--danger); animation: statusGlow 0.5s ease-in-out infinite; }

/* --- Glitch Text --- */
@keyframes glitchText {
  0%, 100% { 
    text-shadow: 2px 0 var(--accent), -2px 0 var(--warning);
    transform: translate(0);
  }
  20% { 
    text-shadow: -2px 0 var(--accent), 2px 0 var(--warning);
    transform: translate(-2px, 1px);
  }
  40% { 
    text-shadow: 2px 2px var(--accent), -2px -2px var(--warning);
    transform: translate(2px, -1px);
  }
}
@keyframes glitchFlicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.8; }
  75% { opacity: 0.95; }
}
[data-theme="gundam"] .gundam-glitch-text {
  animation: glitchText 0.3s ease-in-out infinite, glitchFlicker 0.1s linear infinite;
}
[data-theme="gundam"] .gundam-data-stream {
  font-family: 'Courier New', monospace;
  animation: glitchText 0.5s ease-in-out infinite;
}

/* --- CRT Scanlines --- */
@keyframes scanlineMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100%; }
}
[data-theme="gundam"] .gundam-scanlines::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.1) 2px,
    rgba(0, 0, 0, 0.1) 4px
  );
  pointer-events: none;
  animation: scanlineMove 8s linear infinite;
}

/* --- Gundam Theme Toggle Button --- */
[data-theme="gundam"] body {
  background: linear-gradient(135deg, #0a0f1a 0%, #0d1525 50%, #0a0f1a 100%);
  background-attachment: fixed;
}
[data-theme="gundam"] .gundam-header-glow {
  text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent-glow);
  color: var(--accent);
}
[data-theme="gundam"] .gundam-accent-border {
  border-color: var(--accent) !important;
  box-shadow: inset 0 0 10px var(--accent-glow), 0 0 10px var(--accent-glow);
}
[data-theme="gundam"] .gundam-ntd-active {
  animation: psychoframePulse 2s ease-in-out infinite;
  border-color: var(--psychoframe-pink);
}
  </style>

<body>
  <div id="root"></div>
  <!-- Gundam Console UI Toggle -->
  <button id="gundam-theme-toggle" onclick="toggleGundamTheme()" title="Gundam Console UI" style="position:fixed;bottom:20px;right:20px;z-index:9999;width:56px;height:56px;border-radius:50%;background:var(--accent, #00D4FF);border:2px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,212,255,0.5);font-size:24px;transition:all 0.3s;">
    🤖
  </button>
  <script>
    function toggleGundamTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'gundam') {
        html.removeAttribute('data-theme');
        document.body.style.background = '';
      } else {
        html.setAttribute('data-theme', 'gundam');
        // Add Gundam classes to main elements
        document.querySelectorAll('header, nav, main, section, article, .card, [class*="card"]').forEach(el => {
          if (!el.classList.contains('gundam-hud-card')) el.classList.add('gundam-hud-card');
        });
        // Glitch effect on title
        document.querySelectorAll('h1, h2, h3').forEach(el => {
          if (!el.classList.contains('gundam-glitch-text')) el.classList.add('gundam-glitch-text');
        });
      }
    }
    // Auto-apply HUD frame to cards when page loads in gundam mode
    if (document.documentElement.getAttribute('data-theme') === 'gundam') {
      toggleGundamTheme();
    }
  </script>
    <script>

                        console.log('SW registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
