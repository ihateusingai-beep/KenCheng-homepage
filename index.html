/* ============================
   GUNDAM CONSOLE UI - 8 MODES
   Full system from gundam-console-ui skill

/* --- BASE THEME (all gundam-* modes inherit) --- */
[data-theme^="gundam-"] {
  --bg-primary: #0a0f1a;
  --bg-card: #121830;
  --bg-input: #1a2540;
  --bg-elevated: #1e2a45;
  --text-primary: #E8F4F8;
  --text-secondary: #6A8BA8;
  --text-muted: #4A6178;
  --accent: #00D4FF;
  --accent-secondary: #FF69B4;
  --accent-glow: rgba(0, 212, 255, 0.25);
  --accent-glow-alt: rgba(255, 105, 180, 0.4);
  --success: #00AA00;
  --warning: #FF8C00;
  --danger: #FF4444;
  --border-color: #1E3A5F;
  --border-glow: rgba(0, 212, 255, 0.3);
  --card-glow: 0 0 15px var(--accent-glow);
  --card-glow-alt: 0 0 15px var(--accent-glow-alt);
}

/* --- PER-THEME OVERRIDES --- */

  --accent: #00D4FF;

  --bg-primary: #0a0f1a;
  --bg-card: #121830;
  --border-color: #1E3A5F;
  background-image:
    url('/KenCheng-homepage/assets/gundam-assets/core-unicorn/bg-unicorn-core-02.jpg'),
    url('/KenCheng-homepage/assets/gundam-assets/core-unicorn/bg-unicorn-core-01.jpg'),
    url('/KenCheng-homepage/assets/gundam-assets/core-unicorn/bg-unicorn-core-03.jpg'),
    linear-gradient(180deg, #0a0f1a 0%, #1a0a2e 40%, #0a0f1a 100%);
  background-size: cover, cover, cover, cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* ============================
   GUNDAM MODE BUTTONS (extracted from inline)
   ============================ */

}

/* ============================
   HUD FRAME COMPONENTS
   ============================ */
[data-theme^="gundam-"] .gundam-hud-card {
  background: var(--bg-card);
  padding: 20px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  box-shadow: var(--card-glow);
  position: relative;
}
[data-theme^="gundam-"] .gundam-hud-card::before,
[data-theme^="gundam-"] .gundam-hud-card::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid var(--accent);
  opacity: 0.6;
}
[data-theme^="gundam-"] .gundam-hud-card::before {
  top: -1px; left: -1px;
  border-right: none; border-bottom: none;
}
[data-theme^="gundam-"] .gundam-hud-card::after {
  bottom: -1px; right: -1px;
  border-left: none; border-top: none;
}

/* ============================
   PSYCHOFRAME PULSE (NT-D Unicorn)
   ============================ */
[data-theme="gundam-ntd"] .gundam-pulse,
[data-theme="gundam-ntd"] .gundam-hud-card {
  animation: psychoframePulse 2s ease-in-out infinite;
}
@keyframes psychoframePulse {
  0%, 100% {
    box-shadow: 0 0 8px rgba(255, 105, 180, 0.2), 0 0 16px rgba(255, 105, 180, 0.1);
  }
  50% {
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.3), 0 0 30px rgba(255, 105, 180, 0.15);
  }
}

/* ============================
   SEED FREEDOM — 爆SEED BURST + PRISMATIC
   ============================ */
[data-theme="gundam-seed"] .gundam-pulse,
[data-theme="gundam-seed"] .gundam-hud-card {
  animation: seedBurst 3s ease-in-out infinite;
}
@keyframes seedBurst {
  0% {
    box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent-secondary);
    transform: scale(1);
  }
  30% {
    box-shadow: 0 0 30px var(--accent-secondary), 0 0 60px var(--accent), 0 0 90px rgba(255, 215, 0, 0.3);
    transform: scale(1.05);
  }
  60% {
    box-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent-secondary);
    transform: scale(1.02);
  }
  100% {
    box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent-secondary);
    transform: scale(1);
  }
}
[data-theme="gundam-seed"] .gundam-seed-prismatic {
  animation: prismaticShift 4s ease-in-out infinite;
}
@keyframes prismaticShift {
  0% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(20deg) brightness(1.2); }
  100% { filter: hue-rotate(0deg) brightness(1); }
}

/* ============================
   CROSSBONE X-1 — SKULL FLASH + BONE FRAME
   ============================ */
[data-theme="gundam-crossbone"] .gundam-pulse,
[data-theme="gundam-crossbone"] .gundam-hud-card {
  animation: skullFlash 4s ease-in-out infinite;
}
@keyframes skullFlash {
  0%, 70%, 100% { opacity: 0.9; text-shadow: 0 0 8px var(--accent); }
  75% { opacity: 1; text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent-secondary); }
  80% { opacity: 0.7; text-shadow: 0 0 5px var(--accent); }
  85% { opacity: 1; text-shadow: 0 0 25px var(--accent), 0 0 50px var(--accent-secondary); }
}
@keyframes boneFracture {
  0%, 100% { border-color: var(--border-color); box-shadow: none; }
  50% { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
}
[data-theme="gundam-crossbone"] .gundam-bone-frame {
  animation: boneFracture 3s ease-in-out infinite;
  border-style: dashed;
}

/* ============================
   NT-D GREEN FRAME — SCAN WAVE + 感应波
   ============================ */
[data-theme="gundam-ntd-green"] .gundam-pulse,
[data-theme="gundam-ntd-green"] .gundam-hud-card {
  animation: greenScanWave 2s ease-in-out infinite;
}
@keyframes greenScanWave {
  0% {
    box-shadow: 0 0 10px var(--accent-glow);
    border-color: var(--accent);
  }
  50% {
    box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(0, 255, 136, 0.2);
    border-color: var(--accent);
  }
  100% {
    box-shadow: 0 0 10px var(--accent-glow);
    border-color: var(--border-color);
  }
}
@keyframes 感应波Pulse {
  0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 10px var(--accent-glow); }
  50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(0, 212, 255, 0.2); }
  100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 10px var(--accent-glow); }
}
[data-theme="gundam-ntd-green"] .gundam-感应波 {
  animation: 感应波Pulse 1.5s ease-in-out infinite;
  border: 1px solid var(--accent);
  border-radius: 50%;
}

/* ============================
   00 QUBIT — TRANS-AM + GN PARTICLE
   ============================ */
[data-theme="gundam-00"] .gundam-pulse,
[data-theme="gundam-00"] .gundam-hud-card {
  animation: transAmBurst 1s ease-out infinite;
}
@keyframes transAmBurst {
  0% {
    box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent-secondary);
    transform: scale(1);
  }
  30% {
    box-shadow: 0 0 40px var(--accent), 0 0 80px var(--accent-secondary), 0 0 120px rgba(0, 255, 136, 0.2);
    transform: scale(1.05);
    border-color: var(--accent);
  }
  60% {
    box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent-secondary);
    transform: scale(1.02);
  }
  100% {
    box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent-secondary);
    transform: scale(1);
  }
}
@keyframes gnParticleFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
[data-theme="gundam-00"] .gundam-gn-particle {
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-secondary) 50%, var(--accent) 100%);
  background-size: 200% 100%;
  animation: gnParticleFlow 2s linear infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
@keyframes qubitPulse {
  0%, 100% { box-shadow: 0 0 8px var(--accent-glow); transform: scale(1); opacity: 0.9; }
  50% { box-shadow: 0 0 25px var(--accent-glow), 0 0 50px rgba(0, 255, 136, 0.3); transform: scale(1.1); opacity: 1; }
}
[data-theme="gundam-00"] .gundam-qubit-pulse {
  animation: qubitPulse 1.5s ease-in-out infinite;
  border-radius: 50%;
  border: 1px solid var(--accent);
}

/* ============================
   DESTINY / LEGEND — BEAM BLADE + FLAME SURGE
   ============================ */
[data-theme="gundam-destiny"] .gundam-pulse,
[data-theme="gundam-destiny"] .gundam-hud-card {
  animation: flameSurge 2.5s ease-in-out infinite;
}
@keyframes flameSurge {
  0%, 100% { box-shadow: 0 0 10px var(--accent-glow); border-color: var(--border-color); }
  33% { box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(255, 102, 0, 0.3); border-color: var(--accent); }
  66% { box-shadow: 0 0 15px var(--accent-glow-alt); border-color: var(--accent-secondary); }
}
@keyframes beamBladeShimmer {
  0%, 100% { text-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent-secondary); opacity: 0.9; }
  25% { text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent-secondary), 0 0 60px rgba(204, 0, 0, 0.3); opacity: 1; }
  50% { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent-secondary); opacity: 0.85; }
  75% { text-shadow: 0 0 25px var(--accent), 0 0 50px var(--accent-secondary), 0 0 70px rgba(255, 215, 0, 0.2); opacity: 1; }
}
[data-theme="gundam-destiny"] .gundam-beam-blade {
  animation: beamBladeShimmer 2s ease-in-out infinite;
  color: var(--accent);
}

/* ============================
   GOD GUNDAM — FLAME PATTERN + FIRE PULSE
   ============================ */
[data-theme="gundam-god"] .gundam-pulse,
[data-theme="gundam-god"] .gundam-hud-card {
  animation: firePulse 1.5s ease-in-out infinite;
}
@keyframes firePulse {
  0%, 100% {
    box-shadow: 0 0 10px var(--accent-glow), 0 0 20px rgba(255, 102, 0, 0.2);
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(255, 102, 0, 0.4), 0 0 90px rgba(255, 215, 0, 0.2);
    transform: scale(1.03);
  }
}
@keyframes flamePattern {
  0%, 100% { background-position: 0% 50%; filter: hue-rotate(0deg) brightness(1); }
  50% { background-position: 100% 50%; filter: hue-rotate(15deg) brightness(1.15); }
}
[data-theme="gundam-god"] .gundam-flame-text {
  animation: flamePattern 3s ease-in-out infinite;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-secondary) 50%, var(--accent) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ============================
   CARTOON KAWAII — BOUNCE + WOBBLE + SPARKLE
   ============================ */
[data-theme="gundam-cartoon"] .gundam-hud-card {
  border-radius: 20px;
  border: 2px solid var(--border-color);
  box-shadow: var(--card-glow);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(255, 158, 207, 0.06) 100%);
}
[data-theme="gundam-cartoon"] .gundam-hud-card::before,
[data-theme="gundam-cartoon"] .gundam-hud-card::after {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border-color: var(--accent);
}
[data-theme="gundam-cartoon"] .gundam-status-ok {
  color: #6ECF8E;
  animation: cartoonFloat 2s ease-in-out infinite;
}
[data-theme="gundam-cartoon"] .gundam-status-warn {
  color: #FFB347;
  animation: cartoonWobble 0.8s ease-in-out infinite;
}
[data-theme="gundam-cartoon"] .gundam-status-alert {
  color: #FF6B6B;
  animation: cartoonBounce 0.4s ease-in-out infinite;
}
@keyframes cartoonBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  25% { transform: translateY(-10px) scale(1.03); }
  50% { transform: translateY(-6px) scale(1.01); }
  75% { transform: translateY(-8px) scale(1.02); }
}
@keyframes cartoonWobble {
  0%, 100% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(-6deg) scale(1.02); }
  40% { transform: rotate(4deg) scale(0.99); }
  60% { transform: rotate(-4deg) scale(1.01); }
  80% { transform: rotate(5deg) scale(0.98); }
}
@keyframes cartoonSparkle {
  0%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
  30% { opacity: 1; transform: scale(1.3) rotate(15deg); }
  60% { opacity: 0.8; transform: scale(1.1) rotate(-10deg); }
}
@keyframes cartoonFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}
@keyframes cartoonPulse {
  0%, 100% { box-shadow: 0 4px 12px rgba(255, 158, 207, 0.3); }
  50% { box-shadow: 0 4px 24px rgba(255, 158, 207, 0.6), 0 0 40px rgba(126, 232, 200, 0.3); }
}
[data-theme="gundam-cartoon"] .gundam-cartoon-bounce { animation: cartoonBounce 0.6s ease-in-out infinite; }
[data-theme="gundam-cartoon"] .gundam-cartoon-wobble { animation: cartoonWobble 0.8s ease-in-out infinite; }
[data-theme="gundam-cartoon"] .gundam-cartoon-sparkle { animation: cartoonSparkle 1.5s ease-in-out infinite; }
[data-theme="gundam-cartoon"] .gundam-cartoon-float { animation: cartoonFloat 2s ease-in-out infinite; }
[data-theme="gundam-cartoon"] .gundam-cartoon-pulse { animation: cartoonPulse 2s ease-in-out infinite; }

/* ============================
   SHARED — ALL 8 MODES
   ============================ */

/* Glitch Text */
@keyframes glitchText {
  0%, 100% { text-shadow: 2px 0 var(--accent), -2px 0 var(--warning); transform: translate(0); }
  10% { text-shadow: -2px 0 var(--accent), 2px 0 var(--warning); transform: translate(-2px, 1px); }
  20% { text-shadow: 2px 2px var(--accent), -2px -2px var(--warning); transform: translate(2px, -1px); }
  30% { transform: translate(-1px, 2px); }
  40% { transform: translate(1px, -2px); }
  50% { transform: translate(-2px, 1px); }
  60% { transform: translate(2px, -1px); }
  70% { transform: translate(-1px, -2px); }
  80% { transform: translate(1px, 2px); }
  90% { transform: translate(-2px, -1px); }
}
[data-theme^="gundam-"] .gundam-glitch-text {
  animation: glitchText 0.4s ease-in-out infinite;
  color: var(--accent);
}

/* Radar Sweep */
@keyframes radarSweep {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
[data-theme^="gundam-"] .gundam-radar {
  position: relative;
  overflow: hidden;
  border-radius: 50%;
  background: repeating-radial-gradient(
    circle at center,
    transparent 0px,
    transparent 18px,
    rgba(0, 212, 255, 0.15) 18px,
    rgba(0, 212, 255, 0.15) 19px
  ),
  conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    rgba(0, 212, 255, 0.4) 30deg,
    transparent 60deg
  );
  animation: radarSweep 3s linear infinite;
}
[data-theme^="gundam-"] .gundam-radar::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 8px;
  height: 8px;
  margin: -4px 0 0 -4px;
  border-radius: 50%;
  background: var(--accent);
  animation: psychoframePulse 1.5s ease-out infinite;
}

/* Energy Bar */
@keyframes energyFill {
  0% { width: 0%; }
  50% { box-shadow: 0 0 15px var(--accent); }
  100% { box-shadow: 0 0 5px var(--accent); }
}
[data-theme^="gundam-"] .gundam-energy-bar {
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
}
[data-theme^="gundam-"] .gundam-energy-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #00ffaa);
  animation: energyFill 1.5s ease-out forwards;
}

/* Status Pulse */
@keyframes statusPulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 5px currentColor; }
  50% { opacity: 0.3; box-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
}
@keyframes statusGlow {
  0%, 100% { box-shadow: 0 0 5px currentColor; }
  50% { box-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
}
[data-theme^="gundam-"] .gundam-status-ok {
  color: var(--success);
  animation: statusPulse 2s ease-in-out infinite;
}
[data-theme^="gundam-"] .gundam-status-warn {
  color: var(--warning);
  animation: statusPulse 1s ease-in-out infinite;
}
[data-theme^="gundam-"] .gundam-status-alert {
  color: var(--danger);
  animation: statusGlow 0.5s ease-in-out infinite;
}

/* Scanlines */
@keyframes scanlineMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100%; }
}
[data-theme^="gundam-"] .gundam-scanlines {
  position: relative;
  overflow: hidden;
}
[data-theme^="gundam-"] .gundam-scanlines::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  pointer-events: none;
  animation: scanlineMove 8s linear infinite;
}
[data-theme^="gundam-"] .gundam-scanlines > * {
  position: relative;
  z-index: 1;
}

/* Emblem Pulse */
@keyframes gundamEmblemPulse {
  0%, 100% { box-shadow: 0 0 10px var(--accent-glow); }
  50% { box-shadow: 0 0 25px var(--accent-glow), 0 0 50px var(--accent-glow-alt); }
}

/* Mode body backgrounds */
[data-theme="gundam-ntd"] body { background: linear-gradient(135deg, #0a0f1a 0%, #0d1525 50%, #0a0f1a 100%) fixed; }
[data-theme="gundam-seed"] body { background: linear-gradient(135deg, #080c14 0%, #002244 40%, #001533 70%, #000d1a 100%) fixed; }
[data-theme="gundam-crossbone"] body { background: linear-gradient(135deg, #0f0808 0%, #2a1010 50%, #1a0808 100%) fixed; }
[data-theme="gundam-ntd-green"] body { background: linear-gradient(135deg, #080f0a 0%, #091209 50%, #080f0a 100%) fixed; }
[data-theme="gundam-00"] body { background: linear-gradient(135deg, #070a0f 0%, #0a1015 50%, #070a0f 100%) fixed; }
[data-theme="gundam-destiny"] body { background: linear-gradient(135deg, #0f0808 0%, #1a0808 50%, #0f0808 100%) fixed; }
[data-theme="gundam-god"] body { background: linear-gradient(135deg, #0f0a07 0%, #1a1208 50%, #0f0a07 100%) fixed; }
[data-theme="gundam-cartoon"] body { background: linear-gradient(135deg, #FFF5F8 0%, #FFE8F0 50%, #FFF5F8 100%) fixed; }

/* Corner HUD frames with actual PNG assets */
[data-theme^="gundam-"] #hud-corner-tl {
  background: url('/KenCheng-homepage/assets/gundam-assets/hud-corner-tl.png') no-repeat;
  background-size: contain;
}
[data-theme^="gundam-"] #hud-corner-tr {
  background: url('/KenCheng-homepage/assets/gundam-assets/hud-corner-tl.png') no-repeat;

}
[data-theme^="gundam-"] #hud-corner-bl {
  background: url('/KenCheng-homepage/assets/gundam-assets/hud-corner-br.png') no-repeat;
  background-size: contain;
}
[data-theme^="gundam-"] #hud-corner-br {
  background: url('/KenCheng-homepage/assets/gundam-assets/hud-corner-br.png') no-repeat;
  background-size: contain;
}

/* Grid backgrounds */
[data-theme^="gundam-"] body {
  background-image:
    url('/KenCheng-homepage/assets/gundam-assets/hex-grid.png'),
    linear-gradient(var(--bg-primary) 0%, var(--bg-primary) 100%);
  background-repeat: repeat, no-repeat;
  background-size: auto, cover;
}

/* Burst effects — fixed position overlays */
.burst-effect {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#burst-tl { top: 60px; left: 60px; width: 200px; height: 200px; }
#burst-tr { top: 60px; right: 60px; width: 200px; height: 200px; transform: scaleX(-1); }
#burst-bl { bottom: 60px; left: 60px; width: 200px; height: 200px; transform: scaleY(-1); }
#burst-br { bottom: 60px; right: 60px; width: 200px; height: 200px; transform: scale(-1); }

/* Warp streak — diagonal speed lines */
@keyframes warpStreakMove {
  0% { transform: translateX(-100%) skewX(-20deg); opacity: 0; }
  20% { opacity: 0.25; }
  80% { opacity: 0.1; }
  100% { transform: translateX(200%) skewX(-20deg); opacity: 0; }
}
.warp-streak {
  position: fixed;
  top: 0; bottom: 0;
  width: 300px;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, transparent 100%);
  animation: warpStreakMove 1.5s ease-out infinite;
}
#warp-left { left: -50px; }
#warp-right { right: -50px; animation-direction: reverse; }

/* Glitch overlay */
#glitch-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9996;
  opacity: 0;
  background: url('/KenCheng-homepage/assets/gundam-assets/glitch-overlay.png') center/cover;
  mix-blend-mode: screen;
}

/* Emblem badge — themed per mode */
#emblem-badge {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 60px;
  z-index: 8889;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}
[data-theme="gundam-ntd"] #emblem-badge {
  background-image: url('/KenCheng-homepage/assets/gundam-assets/emblem-ntd.png');
}
[data-theme="gundam-seed"] #emblem-badge {
  background-image: url('/KenCheng-homepage/assets/gundam-assets/emblem-seed.png');
}
[data-theme="gundam-crossbone"] #emblem-badge {
  background-image: url('/KenCheng-homepage/assets/gundam-assets/emblem-crossbone.png');
}
[data-theme="gundam-ntd-green"] #emblem-badge {
  background-image: url('/KenCheng-homepage/assets/gundam-assets/emblem-ntd-green.png');
}

/* Sparkle effects — floating particles */
.sparkle-particle {
  position: fixed;
  width: 20px;
  height: 20px;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  background: url('/KenCheng-homepage/assets/gundam-assets/sparkle.png') center/contain no-repeat;
}
@keyframes sparkleFloat {
  0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
  20% { opacity: 0.9; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-120px) scale(1.2) rotate(180deg); opacity: 0; }
}
#sparkle-1 { top: 20%; left: 15%; animation: sparkleFloat 3s ease-out infinite; }
#sparkle-2 { top: 40%; left: 80%; animation: sparkleFloat 4s ease-out infinite 0.5s; }
#sparkle-3 { top: 70%; left: 25%; animation: sparkleFloat 3.5s ease-out infinite 1s; }
#sparkle-4 { top: 30%; left: 70%; animation: sparkleFloat 2.8s ease-out infinite 0.3s; }

/* Pixel dust effect */
#pixel-dust {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  background: url('/KenCheng-homepage/assets/gundam-assets/pixel-dust.png') center/cover;
}

/* Burst animation for cards */
@keyframes burstPop {
  0% { transform: scale(0.8); opacity: 0.6; }
  50% { transform: scale(1.02); opacity: 1; }
  100% { transform: scale(1); opacity: 0.8; }
}
[data-theme="gundam-ntd"] .gundam-hud-card { animation: burstPop 3s ease-in-out infinite; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  [data-theme^="gundam-"] .gundam-pulse,
  [data-theme^="gundam-"] .gundam-glitch-text,
  [data-theme^="gundam-"] .gundam-radar,
  [data-theme^="gundam-"] .gundam-scanlines::after,
  [data-theme^="gundam-"] .gundam-cartoon-bounce,
  [data-theme^="gundam-"] .gundam-cartoon-wobble,
  [data-theme^="gundam-"] .gundam-cartoon-sparkle {
    animation: none;
  }
  [data-theme^="gundam-"] .gundam-glitch-text {
    text-shadow: none;
    transform: none;
  }
}

}
[data-theme^="gundam-"] .gundam-tool-card::after {

/* --- NT-D mode: special psychoframe pulse on stat cards and stars --- */
[data-theme="gundam-ntd"] .gundam-stat-card {

}
[data-theme="gundam-ntd"] .gundam-star-badge {

/* --- SEED mode: prismatic star --- */

  <!-- Gundam Console UI Mode Switcher -->
  <div id="gundam-switcher" >
    <!-- Mode Buttons -->
    <div id="gundam-modes" role="menu" >
      <button onclick="setGundamMode('gundam-ntd')" data-mode="gundam-ntd" class="gundam-mode-btn" aria-label="Switch to NT-D theme" style="border-color:#FF69B4;background:linear-gradient(135deg,#1a0a1a,#2a1530);color:#FF69B4;box-shadow:0 0 10px rgba(255,105,180,0.3);">

      </button>

        🌐 00
      </button>

  <script>
    let gundamMenuOpen = false;
    function toggleGundamMenu() {
      const menu = document.getElementById('gundam-modes');
      gundamMenuOpen = !gundamMenuOpen;
      menu.style.display = gundamMenuOpen ? 'flex' : 'none';
    }
    function setGundamMode(mode) {
      const html = document.documentElement;
      html.removeAttribute('data-theme');
      document.body.style.background = '';

      // Hide all HUD elements with fade
      const hudElements = ['hud-corner-tl','hud-corner-tr','hud-corner-bl','hud-corner-br','theme-emblem','hud-radar','hud-energy','hud-status','ms-silhouette','scanline-overlay','emblem-badge','burst-tl','burst-tr','burst-bl','burst-br','warp-left','warp-right','glitch-overlay','pixel-dust','sparkle-1','sparkle-2','sparkle-3','sparkle-4'];
      hudElements.forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.style.transition = 'opacity 0.3s'; el.style.opacity = '0'; }
      });

      if (mode !== 'off') {
        html.setAttribute('data-theme', mode);
        document.body.style.background = 'var(--bg-primary)';

        // Show HUD corners
        setTimeout(() => {
          document.getElementById('hud-corner-tl').style.opacity = '1';
          document.getElementById('hud-corner-tr').style.opacity = '1';
          document.getElementById('hud-corner-bl').style.opacity = '1';
          document.getElementById('hud-corner-br').style.opacity = '1';

          // Corner frame backgrounds via CSS
          const cornerColor = {
            'gundam-ntd': '#FF69B4',
            'gundam-seed': '#FFD700',
            'gundam-crossbone': '#CC0000',
            'gundam-ntd-green': '#00FF88',
            'gundam-00': '#00FF88',
            'gundam-destiny': '#CC0000',
            'gundam-god': '#FF6600',
            'gundam-cartoon': '#FF9ECF'
          }[mode] || '#00D4FF';

          // Emblem via CSS text
          const emblemText = {
            'gundam-ntd': 'NT-D',
            'gundam-seed': 'SEED',
            'gundam-crossbone': 'X-1',
            'gundam-ntd-green': 'GREEN',
            'gundam-00': '00',
            'gundam-destiny': 'DESTINY',
            'gundam-god': 'GOD',
            'gundam-cartoon': 'KAWAII'
          }[mode] || '';

          const emblem = document.getElementById('theme-emblem');
          emblem.innerHTML = '<div style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:monospace;font-size:16px;font-weight:bold;color:' + cornerColor + ';text-shadow:0 0 10px ' + cornerColor + ', 0 0 20px ' + cornerColor + ';letter-spacing:2px;padding:8px;border:2px solid ' + cornerColor + ';background:rgba(0,0,0,0.5);border-radius:4px;animation:gundamEmblemPulse 2s ease-in-out infinite;">' + emblemText + '</div>';
          emblem.style.opacity = '1';

          // Status text
          const statusText = {
            'gundam-ntd': 'PSYCHOFRAME ACTIVE',
            'gundam-seed': 'PLANT DEFENSE',
            'gundam-crossbone': 'CROSSBONE MARAUDER',
            'gundam-ntd-green': 'SCANNING',
            'gundam-00': 'TWIN DRIVE ONLINE',
            'gundam-destiny': 'PULSE EDGE READY',
            'gundam-god': 'FLAME TOME ACTIVE',
            'gundam-cartoon': '萌え全開！'
          }[mode] || 'SYSTEM ONLINE';
          const status = document.getElementById('hud-status');
          status.style.color = cornerColor;
          status.style.textShadow = '0 0 8px ' + cornerColor;
          status.textContent = statusText;
          status.style.opacity = '1';

          // Energy bar
          const energy = document.getElementById('hud-energy');
          energy.innerHTML = '<div style="font-family:monospace;font-size:9px;color:' + cornerColor + ';margin-bottom:4px;letter-spacing:1px;">ENERGY</div><div style="width:160px;height:8px;background:rgba(0,0,0,0.6);border:1px solid ' + cornerColor + ';border-radius:2px;overflow:hidden;"><div style="width:75%;height:100%;background:linear-gradient(90deg,' + cornerColor + ',transparent);animation:energyFill 2s ease-out infinite;"></div></div>';
          energy.style.opacity = '1';

    <script>
    (function() {
      function initRecommendations() {
        if (!window.__recommendTools) return;
        var bk = JSON.parse(localStorage.getItem('kencheng-bookmarks') || '[]');
        var ru = JSON.parse(localStorage.getItem('kencheng-recent') || '[]');
        if (bk.length === 0 && ru.length === 0) return;

        var recs = window.__recommendTools();
        if (!recs || recs.length === 0) return;

        // Find the weekly picks section h2
        var h2s = document.querySelectorAll('h2');
        var weeklyH2 = null;
        for (var i = 0; i < h2s.length; i++) {
          if (h2s[i].textContent.trim() === '每週精選') {
            weeklyH2 = h2s[i];
            break;
          }
        }
        if (!weeklyH2) return;

        // Find the parent section
        var section = weeklyH2.closest('section');
        if (!section) return;

        // Find the tool cards container (the grid div inside section)
        var grid = section.querySelector('.grid');
        if (!grid) return;

        // Build recommendation cards - matching the existing card structure
        var icons = {Wrench: 'Wrench', Bot: 'Bot', Calculator: 'Calculator', Video: 'Video', Atom: 'Atom', Star: 'Star', Folder: 'Folder'};
        var html = '';
        for (var j = 0; j < recs.length && j < 5; j++) {
          var tool = recs[j];
          var iconName = icons[tool.icon] || 'Star';
          var starBadge = '<div class="absolute -top-1 -left-1 px-2 py-0.5 text-xs font-bold rounded-full bg-purple-600 text-white">★</div>';
          var card = '<div class="relative">' + starBadge +
            '<div class="p-4 rounded-xl border border-gray-200 dark:border-cyan-500/30 bg-white dark:bg-slate-900/50 shadow-sm hover:shadow-md transition-shadow cursor-pointer" onclick="window.open(\'' + tool.url + '\', \'_blank\')">' +
            '<h3 class="font-bold text-gray-800 dark:text-cyan-50 text-sm mb-1">' + tool.name + '</h3>' +
            '<p class="text-xs text-gray-500 dark:text-slate-400 line-clamp-2">' + tool.desc + '</p>' +
            '</div></div>';
          html += card;
        }

        if (html) {
          grid.innerHTML = html;
          // Update section heading
          var newH2 = weeklyH2.cloneNode(true);
          newH2.innerHTML = '⭐ 為你推薦';
          weeklyH2.parentNode.replaceChild(newH2, weeklyH2);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initRecommendations);
      } else {
        // Small delay to ensure React has rendered
        setTimeout(initRecommendations, 500);
      }
    })();
    </script>
